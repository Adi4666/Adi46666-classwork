<!DOCTYPE html>
<html>
<head>
    <title>Square Path Animation</title>
    <style>
        body{
            background-color: aquamarine;
        }
        .container {
            width: 300px;
            height: 300px;
            border: 2px solid black;
            position: relative;
            margin: 50px auto;
            background-color: palevioletred;
        }

        .box {
            width: 50px;
            height: 50px;
            background-color: blue;
            position: absolute;
            animation: squareMove 4s infinite linear;
        }

        @keyframes squareMove {
            0% {
                top: 0;
                left: 0;
                transform: rotate(0deg);
            }

            25% {
                top: 0;
                left: 250px;
                transform: rotate(27deg);
            }

            50% {
                top: 250px;
                left: 250px;
                transform: rotate(10deg);
            }

            75% {
                top: 250px;
                left: 0;
                transform: rotate(12deg);
            }

            100% {
                top: 0;
                left: 0;
                transform: rotate(670deg);
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="box"></div>
    </div>

</body>
</html>
